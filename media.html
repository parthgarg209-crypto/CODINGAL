<!DOCTYPE html>
<html>
    <head>
        <title>Media in html</title>
    </head>
    <body>
        <!---inmage-->
        <h1>Html image</h1>
        <img src="flower.jpeg"alt="flower" width="400" height="200">
        
        <!---audio and video-->
        <h1>AUDIO AND VIDEO</h1>
        <audio controls>
            <source src="loop_music.mp3" type="audio/mpeg">
        </audio>

        <p>this is one of my favourite videos</p>
        <video controls width="500" height="400">
            <source src="why_codingal_imp.mp4" type="video/mp4">
        </video>

        <!---IFRAME-->
        <h1>Html iframe</h1>
        <iframe src="https://www.youtube.com/embed/9bZkp7q19f0" width="500" height="315">
        </iframe>
    </body>
</html>
